<div class="p-6 bg-gray-50 min-h-screen">
  <h1 class="text-3xl font-bold text-gray-800 mb-8">Panel de Venta Realistas</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
      <p class="text-sm text-gray-500 uppercase font-semibold">Ventas Totales</p>
      <h2 class="text-2xl font-bold text-gray-800">${{ totalVentas | number:'1.2-2'}}</h2>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
      <p class="text-sm text-gray-500 uppercase font-semibold">Ticket Promedio</p>
      <h2 class="text-2xl font-bold text-gray-800">$ {{ promedioVenta | number:'1.2-2' }}</h2>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
      <p class="text-sm text-gray-500 uppercase font-semibold">Productos Vendidos</p>
      <h2 class="text-2xl font-bold text-gray-800">{{ totalProductos }} unidades</h2>
    </div>
  </div>
  <div class="bg-white p-6 rounded-xl shadow-md">
    <h3 class="text-lg font-semibold mb-4 text-gray-700">Distribución de Ingresos por Producto</h3>
    <canvas id="myChart"></canvas>
  </div>
</div>
